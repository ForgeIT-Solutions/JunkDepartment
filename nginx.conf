server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip for faster loads
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Next.js static export uses trailingSlash: true, so each route is a
    # directory containing index.html (e.g. /about/ -> /about/index.html).
    # Resolve a request to: exact file -> directory index -> "<path>.html" -> 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache the immutable build assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Served from the export's generated 404 page
    error_page 404 /404.html;
}
